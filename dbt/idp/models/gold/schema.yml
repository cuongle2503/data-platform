version: 2

models:
  - name: dim_countries
    description: Country dimension table
    columns:
      - name: country_key
        description: Surrogate key
        tests:
          - unique
          - not_null
      - name: country_code
        description: Natural key (ISO 2-letter code)
        tests:
          - unique
          - not_null

  - name: dim_indicators
    description: Indicator dimension table
    columns:
      - name: indicator_key
        description: Surrogate key
        tests:
          - unique
          - not_null
      - name: indicator_code
        description: Natural key (World Bank code)
        tests:
          - unique
          - not_null

  - name: dim_dates
    description: Date dimension table
    columns:
      - name: date_key
        description: Surrogate key
        tests:
          - unique
          - not_null
      - name: year
        description: Natural key (Year)
        tests:
          - unique
          - not_null

  - name: fact_economic_indicators
    description: Fact table containing economic indicators values
    columns:
      - name: indicator_key
        description: Foreign key to dim_indicators
        tests:
          - not_null
          - relationships:
              to: ref('dim_indicators')
              field: indicator_key
      - name: country_key
        description: Foreign key to dim_countries
        tests:
          - not_null
          - relationships:
              to: ref('dim_countries')
              field: country_key
      - name: date_key
        description: Foreign key to dim_dates
        tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_key
      - name: value
        description: Indicator value
      - name: source
        description: Source system
        tests:
          - not_null
      - name: loaded_at
        description: Timestamp when record was loaded
    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - indicator_key
            - country_key
            - date_key
            - source
